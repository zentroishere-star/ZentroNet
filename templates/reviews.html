
{% extends 'base.html' %}
{% load static %}

{% block title %}Reviews - Zentro{% endblock %}

{% block content %}
<!-- PAGE HEADER -->
<section class="hero" style="min-height: 50vh; padding-top: 40px;">
    <div class="hero-content">
        <h1>Client Reviews</h1>
        <p>See what our clients think about our work</p>
    </div>
</section>

<!-- REVIEWS SECTION -->
<section class="section">
    <div class="container" style="max-width: 1000px;">
        <h2>Share Your Review</h2>

        <!-- Review Form -->
        <div class="form-box" style="background: rgba(244, 196, 48, 0.1); padding: 40px; border-radius: 10px; margin-bottom: 60px;">
            <div class="form-group">
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Your Name</label>
                <input type="text" id="name" placeholder="Enter your name" class="form-control">
            </div>

            <div class="form-group">
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Rating</label>
                <div class="rating-group" style="display: flex; gap: 10px; align-items: center;">
                    <span class="star" data-rating="1" style="font-size: 2rem; cursor: pointer; color: #ccc; transition: color 0.2s;">★</span>
                    <span class="star" data-rating="2" style="font-size: 2rem; cursor: pointer; color: #ccc; transition: color 0.2s;">★</span>
                    <span class="star" data-rating="3" style="font-size: 2rem; cursor: pointer; color: #ccc; transition: color 0.2s;">★</span>
                    <span class="star" data-rating="4" style="font-size: 2rem; cursor: pointer; color: #ccc; transition: color 0.2s;">★</span>
                    <span class="star" data-rating="5" style="font-size: 2rem; cursor: pointer; color: #ccc; transition: color 0.2s;">★</span>
                    <span class="rating-text" id="ratingText" style="margin-left: 15px; font-weight: 600; color: var(--primary-color);">Select rating</span>
                </div>
            </div>

            <div class="form-group">
                <label style="display: block; margin-bottom: 8px; font-weight: bold;">Your Review</label>
                <textarea id="message" placeholder="Write your review..." class="form-control" rows="5"></textarea>
            </div>

            <button onclick="addReview()" class="btn btn-primary" style="margin-top: 20px;">Submit Review</button>
        </div>

        <h2 style="margin-top: 60px; margin-bottom: 40px;">All Reviews</h2>

        <!-- Review Display -->
        <div id="reviewContainer"></div>
    </div>
</section>

<script>
let currentRating = 0;

// Star rating functionality
document.querySelectorAll('.star').forEach(star => {
    star.addEventListener('click', function() {
        currentRating = this.dataset.rating;
        updateStarDisplay();
    });

    star.addEventListener('mouseover', function() {
        let hoverRating = this.dataset.rating;
        document.querySelectorAll('.star').forEach((s, index) => {
            s.style.color = index < hoverRating ? 'var(--primary-color)' : '#ccc';
        });
    });
});

document.querySelector('.rating-group').addEventListener('mouseleave', updateStarDisplay);

function updateStarDisplay() {
    document.querySelectorAll('.star').forEach((star, index) => {
        star.style.color = index < currentRating ? 'var(--primary-color)' : '#ccc';
    });

    const ratingTexts = ['Select rating', '1 Star', '2 Stars', '3 Stars', '4 Stars', '5 Stars'];
    document.getElementById('ratingText').textContent = ratingTexts[currentRating];
}

// Security: Escape HTML to prevent XSS
function escapeHtml(text) {
    const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, m => map[m]);
}

function addReview() {
    let name = document.getElementById("name").value.trim();
    let message = document.getElementById("message").value.trim();

    if(name === "" || message === "") {
        alert("Please fill all fields");
        return;
    }

    if(currentRating === 0) {
        alert("Please select a rating");
        return;
    }

    const review = {
        id: Date.now(),
        name: name,
        message: message,
        rating: currentRating,
        date: new Date().toLocaleDateString()
    };

    // Get existing reviews from localStorage
    let reviews = JSON.parse(localStorage.getItem('reviews')) || [];
    reviews.unshift(review); // Add to beginning
    localStorage.setItem('reviews', JSON.stringify(reviews));

    // Clear inputs
    document.getElementById("name").value = "";
    document.getElementById("message").value = "";
    currentRating = 0;
    updateStarDisplay();

    renderReviews();
}

function deleteReview(id) {
    let reviews = JSON.parse(localStorage.getItem('reviews')) || [];
    reviews = reviews.filter(r => r.id !== id);
    localStorage.setItem('reviews', JSON.stringify(reviews));
    renderReviews();
}

function renderReviews() {
    let reviews = JSON.parse(localStorage.getItem('reviews')) || [];
    const container = document.getElementById('reviewContainer');

    if(reviews.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 40px 0; color: #888;">No reviews yet. Be the first to review!</div>';
        return;
    }

    container.innerHTML = reviews.map(review => `
        <div style="background: rgba(26, 26, 26, 0.5); padding: 25px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid var(--primary-color);">
            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                <div>
                    <div style="font-weight: 600; font-size: 1.1rem; color: #fff; margin-bottom: 5px;">${escapeHtml(review.name)}</div>
                    <div style="color: var(--primary-color); font-size: 1.3rem;">${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}</div>
                </div>
                <button onclick="deleteReview(${review.id})" style="background: rgba(244, 196, 48, 0.2); border: 1px solid var(--primary-color); color: var(--primary-color); padding: 8px 16px; border-radius: 5px; cursor: pointer; transition: all 0.3s;">Delete</button>
            </div>
            <p style="color: #ccc; line-height: 1.6; margin: 15px 0; font-style: italic;">"${escapeHtml(review.message)}"</p>
            <p style="color: #888; font-size: 0.9rem;">${review.date}</p>
        </div>
    `).join('');
}

// Load reviews on page load
document.addEventListener('DOMContentLoaded', renderReviews);
</script>
{% endblock %}
