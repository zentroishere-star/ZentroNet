{% extends 'base.html' %}
{% load static %}

{% block title %}Log In - Zentro{% endblock %}

{% block content %}
<!-- PAGE HEADER -->
<section class="hero" style="min-height: 50vh; padding-top: 40px;">
    <div class="hero-content">
        <h1>Welcome Back</h1>
        <p>Log in to your Zentro account</p>
    </div>
</section>

<!-- LOGIN FORM -->
<section class="section">
    <div class="container" style="max-width: 500px;">
        <div class="card">
            <form method="post" action="{% url 'home:login' %}">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="id_username">Username or Email *</label>
                    {{ form.username }}
                </div>
                
                <div class="form-group">
                    <label for="id_password">Password *</label>
                    {{ form.password }}
                </div>
                
                <div class="form-group">
                    <label style="display: flex; align-items: center; gap: 10px;">
                        {{ form.remember_me }}
                        <span>Remember me for 2 weeks</span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 20px;">
                <p style="margin-bottom: 10px;">Don't have an account?</p>
                <a href="{% url 'home:signup' %}" class="btn btn-secondary">Sign Up</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
